<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <p class="Exchange"> Real-time Exchange Rates</p>

        <span>Amount</span>
        <input type="number" class="amount" value="10">

        <div class="Currency">
            <div>
                <span >From</span>
                <select name="" class="from" >
                    <option value="USD">USD</option>
                    <OPtion value="EUR">EUR</OPtion>
                    <OPtion value="NGN">NGN</OPtion>
                    <option value="YUAN">YUAN</option>
                    <option value="POUNDS">POUNDS</option>
                </select>
            </div>
            <button class="swap"><img src="./image/arrow image.jpg" width="30px"></button>

            <div>
                <SPan>To</SPan>
                <select class="to">
                    <option value="USD">USD</option>
                    <OPtion value="EUR">EUR</OPtion>
                    <OPtion value="NGN">NGN</OPtion>
                    <option value="YUAN">YUAN</option>
                    <option value="POUNDS">POUNDS</option>
                </select>
            </div>
        </div>

        <div class="Convert">
            <p class="rate">1 USD = 0.86</p>
            <h2 class="result">8.60 EUR</h2>


        </div>

    </div>


<script src="scripts.js"></script>
</body>

</html>
